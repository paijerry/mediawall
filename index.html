<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>七格媒體牆</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }

  .container {
    display: grid;
    width: 100vw;
    height: 100vh;
  }

  .panel {
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .panel .hint {
    color: #555;
    font-family: sans-serif;
    font-size: 14px;
    text-align: center;
    pointer-events: none;
    user-select: none;
  }

  .panel.dragover {
    outline: 2px dashed #4da3ff;
    outline-offset: -6px;
    background: rgba(77, 163, 255, 0.08);
  }

  .panel img,
  .panel video {
    /* 尺寸由 JS 依原圖比例計算，初始蓋滿格子、超出部分被 panel 裁切，
       拖曳時就能看到原圖被裁掉的區域 */
    position: absolute;
    left: 0;
    top: 0;
    max-width: none;
    transform-origin: 0 0;
    cursor: grab;
    touch-action: none;
    user-select: none;
    -webkit-user-drag: none;
  }
  .panel img.panning,
  .panel video.panning { cursor: grabbing; }

  /* 影片控制列：滑鼠移入該格才顯示 */
  .controls {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    padding: 8px 10px;
    background: rgba(0, 0, 0, 0.65);
    color: #eee;
    font-family: sans-serif;
    font-size: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 1;
  }
  .panel:hover .controls { opacity: 1; }
  .controls label {
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .controls input[type="range"] {
    flex: 1;
    min-width: 0;
  }
  .controls .val {
    width: 38px;
    text-align: right;
  }
</style>
</head>
<body>
<div class="container" id="container"></div>

<script>
  const container = document.getElementById('container');

  // 滾輪縮放（以游標為中心）＋拖曳平移，雙擊重置
  function enableZoomPan(panel, media) {
    let scale = 1, tx = 0, ty = 0;
    let baseTx = 0, baseTy = 0;
    let baseW = 0, baseH = 0;

    // 記錄每個媒體（以來源為鍵）的縮放與位移狀態，輪播回來時還原
    // 存在 panel 上，混播切換元素時記錄不會消失；拖入新檔案時才清掉
    const saved = panel._saved || (panel._saved = new Map());

    // 限制位移範圍，媒體邊緣不能進到格子內（永遠滿版）
    function clamp() {
      const pw = panel.clientWidth, ph = panel.clientHeight;
      tx = Math.min(0, Math.max(pw - baseW * scale, tx));
      ty = Math.min(0, Math.max(ph - baseH * scale, ty));
    }

    function apply() {
      clamp();
      media.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
      saved.set(media.src, { scale, tx, ty });
    }

    // 依原圖比例把元素放大到剛好蓋滿格子並置中（外觀同 cover，但保留完整原圖）
    function layout() {
      const pw = panel.clientWidth, ph = panel.clientHeight;
      const nw = media.naturalWidth || media.videoWidth;
      const nh = media.naturalHeight || media.videoHeight;
      if (!nw || !nh) return;
      const cover = Math.max(pw / nw, ph / nh);
      baseW = nw * cover;
      baseH = nh * cover;
      media.style.width = baseW + 'px';
      media.style.height = baseH + 'px';
      baseTx = (pw - baseW) / 2;
      baseTy = (ph - baseH) / 2;
      const s = saved.get(media.src);
      if (s) {
        // 這張圖之前調整過 → 還原上次的縮放與位移
        scale = s.scale; tx = s.tx; ty = s.ty;
      } else {
        scale = 1; tx = baseTx; ty = baseTy;
      }
      apply();
    }

    if (media.tagName === 'IMG') {
      // 不用 once：幻燈片換圖後要重新計算尺寸並重置縮放位置
      media.addEventListener('load', layout);
      if (media.complete && media.naturalWidth) layout();
    } else {
      if (media.videoWidth) layout();
      else media.addEventListener('loadedmetadata', layout, { once: true });
    }

    const onWheel = e => {
      e.preventDefault();
      const rect = panel.getBoundingClientRect();
      const px = e.clientX - rect.left;
      const py = e.clientY - rect.top;

      const factor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
      const newScale = Math.min(10, Math.max(1, scale * factor));

      // 讓游標下的點在縮放前後保持不動
      tx = px - (px - tx) * (newScale / scale);
      ty = py - (py - ty) * (newScale / scale);
      scale = newScale;

      if (scale === 1) { tx = baseTx; ty = baseTy; } // 縮回原始大小時歸位置中
      apply();
    };
    // 換新檔案時移除舊的滾輪監聽，避免累積
    if (panel._onWheel) panel.removeEventListener('wheel', panel._onWheel);
    panel._onWheel = onWheel;
    panel.addEventListener('wheel', onWheel, { passive: false });

    media.addEventListener('pointerdown', e => {
      if (e.button !== 0) return;
      e.preventDefault();
      media.setPointerCapture(e.pointerId);
      media.classList.add('panning');
      let lastX = e.clientX, lastY = e.clientY;

      const onMove = ev => {
        tx += ev.clientX - lastX;
        ty += ev.clientY - lastY;
        lastX = ev.clientX;
        lastY = ev.clientY;
        apply();
      };
      const onUp = () => {
        media.classList.remove('panning');
        media.removeEventListener('pointermove', onMove);
        media.removeEventListener('pointerup', onUp);
        media.removeEventListener('pointercancel', onUp);
      };
      media.addEventListener('pointermove', onMove);
      media.addEventListener('pointerup', onUp);
      media.addEventListener('pointercancel', onUp);
    });

    media.addEventListener('dblclick', () => {
      scale = 1; tx = baseTx; ty = baseTy;
      apply();
    });
  }

  // 建立影片的音量／播放速度控制列
  function buildControls(video) {
    const box = document.createElement('div');
    box.className = 'controls';

    // 音量 0–100，預設 0
    const volLabel = document.createElement('label');
    volLabel.textContent = '音量';
    const vol = document.createElement('input');
    vol.type = 'range';
    vol.min = 0;
    vol.max = 100;
    vol.value = 0;
    const volVal = document.createElement('span');
    volVal.className = 'val';
    volVal.textContent = '0%';
    vol.addEventListener('input', () => {
      const v = vol.value / 100;
      video.volume = v;
      video.muted = (v === 0); // 音量拉到 0 就回到靜音
      volVal.textContent = vol.value + '%';
    });
    volLabel.append(vol, volVal);

    // 播放速度 0.25x–3x，預設 1x
    const spdLabel = document.createElement('label');
    spdLabel.textContent = '速度';
    const spd = document.createElement('input');
    spd.type = 'range';
    spd.min = 0.25;
    spd.max = 3;
    spd.step = 0.05;
    spd.value = 1;
    const spdVal = document.createElement('span');
    spdVal.className = 'val';
    spdVal.textContent = '1.00x';
    spd.addEventListener('input', () => {
      video.playbackRate = parseFloat(spd.value);
      spdVal.textContent = parseFloat(spd.value).toFixed(2) + 'x';
    });
    spdLabel.append(spd, spdVal);

    box.append(volLabel, spdLabel);
    return box;
  }

  // 建立混合幻燈片控制列：間隔（圖片）＋音量／速度（影片）
  function buildMixedControls(settings, getVideo, onIntervalChange) {
    const box = document.createElement('div');
    box.className = 'controls';

    const mk = (text, min, max, step, value, fmt, oninput) => {
      const label = document.createElement('label');
      label.textContent = text;
      const rng = document.createElement('input');
      rng.type = 'range';
      rng.min = min; rng.max = max; rng.step = step; rng.value = value;
      const val = document.createElement('span');
      val.className = 'val';
      val.textContent = fmt(value);
      rng.addEventListener('input', () => {
        val.textContent = fmt(rng.value);
        oninput(parseFloat(rng.value));
      });
      label.append(rng, val);
      box.append(label);
    };

    mk('間隔', 1, 10, 1, 5, v => v + '秒', v => {
      settings.interval = v;
      onIntervalChange();
    });
    mk('音量', 0, 100, 1, 0, v => v + '%', v => {
      settings.volume = v / 100;
      const vid = getVideo();
      if (vid) { vid.volume = settings.volume; vid.muted = settings.volume === 0; }
    });
    mk('速度', 0.25, 3, 0.05, 1, v => parseFloat(v).toFixed(2) + 'x', v => {
      settings.rate = v;
      const vid = getVideo();
      if (vid) vid.playbackRate = v;
    });

    return box;
  }

  // 從網址參數讀取分割方式：
  //   v = 縱向切（欄），h = 橫向切（列），可單獨或同時使用
  //   ?v=2-1-1        → 三欄，寬度比例 2:1:1（即 1/2、1/4、1/4）
  //   ?h=1-1          → 上下各半
  //   ?v=2-1-1&h=1-1  → 上述方式切成六格
  //   單一數字表示等分，例如 ?v=5 → 5 等欄；都不帶參數 → 預設 7 等欄
  function parseSpec(str) {
    if (!str) return null;
    if (str.includes('-')) {
      const ws = str.split('-').map(Number);
      return ws.every(w => w > 0) ? ws : null;
    }
    const c = parseInt(str, 10);
    return (Number.isInteger(c) && c >= 1) ? Array(c).fill(1) : null;
  }

  const params = new URLSearchParams(location.search);
  const rows = parseSpec(params.get('h')) || [1];
  const cols = parseSpec(params.get('v')) ||
               (params.get('h') ? [1] : Array(7).fill(1));

  container.style.gridTemplateColumns = cols.map(w => w + 'fr').join(' ');
  container.style.gridTemplateRows = rows.map(w => w + 'fr').join(' ');

  for (let i = 0; i < cols.length * rows.length; i++) {
    const panel = document.createElement('div');
    panel.className = 'panel';
    panel.innerHTML = '<div class="hint">拖入圖片<br>或影片</div>';

    panel.addEventListener('dragover', e => {
      e.preventDefault();
      panel.classList.add('dragover');
    });
    panel.addEventListener('dragleave', () => panel.classList.remove('dragover'));

    panel.addEventListener('drop', e => {
      e.preventDefault();
      panel.classList.remove('dragover');

      const files = [...e.dataTransfer.files];
      const mediaFiles = files.filter(f =>
        f.type.startsWith('image/') || f.type.startsWith('video/'));
      if (!mediaFiles.length) return;

      // 清掉舊內容：停止計時器、釋放 object URL、清除縮放記錄
      if (panel._timer) { clearTimeout(panel._timer); panel._timer = null; }
      (panel._urls || []).forEach(u => URL.revokeObjectURL(u));
      panel._urls = [];
      panel._saved = new Map();
      panel.innerHTML = '';

      if (mediaFiles.length > 1) {
        // 多個檔案 → 圖片影片混合幻燈片
        // 圖片顯示「間隔」秒數後換下一個；影片播完一輪換下一個
        const items = mediaFiles.map(f => ({
          url: URL.createObjectURL(f),
          isVideo: f.type.startsWith('video/')
        }));
        panel._urls = items.map(it => it.url);

        const settings = { interval: 5, volume: 0, rate: 1 };
        let idx = -1;
        let current = null;

        function next() { show((idx + 1) % items.length); }

        function show(i) {
          if (panel._timer) { clearTimeout(panel._timer); panel._timer = null; }
          if (current) current.remove();
          idx = i;
          const it = items[i];
          let media;
          if (it.isVideo) {
            media = document.createElement('video');
            media.src = it.url;
            media.muted = settings.volume === 0;
            media.volume = settings.volume;
            media.playbackRate = settings.rate;
            media.autoplay = true;
            media.playsInline = true;
            media.addEventListener('ended', next);
            media.play();
          } else {
            media = document.createElement('img');
            media.src = it.url;
            panel._timer = setTimeout(next, settings.interval * 1000);
          }
          current = media;
          panel.insertBefore(media, controls);
          enableZoomPan(panel, media);
        }

        const controls = buildMixedControls(
          settings,
          () => (current && current.tagName === 'VIDEO') ? current : null,
          () => {
            // 目前顯示的是圖片時，立刻用新間隔重新計時
            if (current && current.tagName === 'IMG') {
              clearTimeout(panel._timer);
              panel._timer = setTimeout(next, settings.interval * 1000);
            }
          }
        );
        panel.appendChild(controls);
        show(0);
      } else {
        // 單一檔案：圖片靜態顯示，影片循環播放
        const f = mediaFiles[0];
        const url = URL.createObjectURL(f);
        panel._urls = [url];
        let media, controls = null;

        if (f.type.startsWith('video/')) {
          media = document.createElement('video');
          media.src = url;
          media.loop = true;      // 循環播放
          media.muted = true;     // 預設音量 0（靜音才能自動播放）
          media.volume = 0;
          media.autoplay = true;
          media.playsInline = true;
          media.play();
          controls = buildControls(media);
        } else {
          media = document.createElement('img');
          media.src = url;
        }

        panel.appendChild(media);
        if (controls) panel.appendChild(controls);
        enableZoomPan(panel, media);
      }
    });

    container.appendChild(panel);
  }

  // 防止拖放到面板外時瀏覽器直接開啟檔案
  window.addEventListener('dragover', e => e.preventDefault());
  window.addEventListener('drop', e => e.preventDefault());
</script>
</body>
</html>
